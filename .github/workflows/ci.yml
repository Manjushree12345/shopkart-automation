name: Java CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SHOPKART_PROFILE: ci
      SHOPKART_ALICE_PW: ${{ secrets.SHOPKART_ALICE_PW }}
      SHOPKART_BOB_PW: ${{ secrets.SHOPKART_BOB_PW }}
      SHOPKART_CAROL_PW: ${{ secrets.SHOPKART_CAROL_PW }}
      SHOPKART_TOKEN_SECRET: ${{ secrets.SHOPKART_TOKEN_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout report history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Prepare report history
        if: always()
        run: rm -rf gh-pages/.git

      - name: Run tests
        run: ./gradlew test --tests "com.shopkart.data.db.MySqlContainerAddonTest"

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Verify report
        if: always()
        run: test -f allure-history/index.html

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history

      - name: Deploy report
        if: always() && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          force_orphan: true

      - name: Report link
        if: always()
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          REPORT_URL="https://${OWNER}.github.io/${REPO}/"

          echo "Latest report: ${REPORT_URL}"
          echo "## Allure Report" >> "$GITHUB_STEP_SUMMARY"
          echo "[Open report](${REPORT_URL})" >> "$GITHUB_STEP_SUMMARY"
